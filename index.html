<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - Classic European Pastel</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 背景のヨーロッパ風パステルグラデーションのゆらぎ -->
        <div class="ambient-glow bg-glow-1"></div>
        <div class="ambient-glow bg-glow-2"></div>

        <!-- 1. Start Screen -->
        <div id="start-screen" class="screen active">
            <header class="game-header">
                <h1>Memory Match</h1>
                <p class="subtitle">A relaxing time in a classic European garden.</p>
            </header>
            
            <div class="level-selection">
                <h2>Select Difficulty</h2>
                <div class="btn-group">
                    <button class="btn btn-easy" data-level="easy">
                        <span class="btn-title">EASY</span>
                        <span class="btn-desc">12 Cards (6 Pairs)</span>
                    </button>
                    <button class="btn btn-medium" data-level="medium">
                        <span class="btn-title">MEDIUM</span>
                        <span class="btn-desc">16 Cards (8 Pairs)</span>
                    </button>
                    <button class="btn btn-hard" data-level="hard">
                        <span class="btn-title">HARD</span>
                        <span class="btn-desc">24 Cards (12 Pairs)</span>
                    </button>
                </div>
            </div>

            <div class="start-footer">
                <p>Your best records are saved automatically</p>
            </div>
        </div>

        <!-- 2. Game Screen -->
        <div id="game-screen" class="screen">
            <header class="game-hud">
                <button id="btn-back" class="btn-icon" title="Back to Title">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/>
                    </svg>
                    <span>BACK</span>
                </button>
                
                <div class="hud-stats">
                    <div class="stat-item">
                        <span class="stat-label">TIME</span>
                        <span id="timer-val" class="stat-value">00:00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">MOVES</span>
                        <span id="moves-val" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">BEST RECORD</span>
                        <span id="best-val" class="stat-value">--</span>
                    </div>
                </div>

                <button id="btn-reset" class="btn-icon" title="Reset Game">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/>
                    </svg>
                    <span>RESET</span>
                </button>
            </header>

            <main class="game-board-wrapper">
                <div id="game-board" class="game-board">
                    <!-- Cards will be generated dynamically by JavaScript -->
                </div>
            </main>
        </div>

        <!-- 3. Clear Screen (Modal) -->
        <div id="clear-modal" class="modal">
            <div class="modal-content">
                <div class="modal-icon">⚜️</div>
                <h2>Congratulations!</h2>
                <p class="modal-message">All card pairs have been elegantly matched.</p>
                
                <div class="result-stats">
                    <div class="result-item">
                        <span class="result-label">Clear Time</span>
                        <span id="result-time" class="result-value">00:00</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Total Moves</span>
                        <span id="result-moves" class="result-value">0</span>
                    </div>
                    <div id="new-best-badge" class="new-best-badge">NEW RECORD! 🎉</div>
                </div>

                <div class="modal-buttons">
                    <button id="btn-play-again" class="btn btn-primary">Play Again</button>
                    <button id="btn-modal-close" class="btn btn-secondary">Back to Title</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
